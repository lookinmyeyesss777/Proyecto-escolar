<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Control Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .login-container {
            margin-top: 10%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center">
        <div class="login-container w-100">
            
            <div class="card border-0 shadow-lg rounded-3">
                <div class="card-body p-5">
                    
                    <div class="text-center mb-4">
                        <div class="text-primary fs-1 mb-2">
                            <i class="bi bi-shield-lock-fill"></i>
                        </div>
                        <h4 class="fw-bold text-dark mb-1">Control Escolar</h4>
                        <p class="text-muted small">Ingresa tus credenciales para acceder</p>
                    </div>

                    {% if form.errors %}
                        <div class="alert alert-danger py-2 small border-0" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i> Usuario o contraseña incorrectos.
                        </div>
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="id_username" class="form-label small fw-bold text-muted">Usuario:</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white text-muted border-end-0"><i class="bi bi-person"></i></span>
                                <input type="text" name="username" id="id_username" 
                                       class="form-control border-start-0 ps-0 shadow-sm" 
                                       placeholder="Ej. Admin" required autofocus>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="id_password" class="form-label small fw-bold text-muted">Contraseña:</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white text-muted border-end-0"><i class="bi bi-key"></i></span>
                                <input type="password" name="password" id="id_password" 
                                       class="form-control border-start-0 ps-0 shadow-sm" 
                                       placeholder="••••••••" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">
                            <i class="bi bi-box-arrow-in-right me-2"></i> Iniciar Sesión
                        </button>
                    </form>

                </div>
            </div>
            
            <div class="text-center mt-3">
                <p class="text-muted small">&copy; 2026 Sistema de Control Escolar</p>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
