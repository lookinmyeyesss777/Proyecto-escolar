<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if object %}Editar{% else %}Nuevo{% endif %} Horario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Control Escolar</a>
    </div>
</nav>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="mb-4">{% if object %}Editar{% else %}Nuevo{% endif %} Horario</h2>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_dias" class="form-label">Días</label>
                            {{ form.dias }}
                        </div>
                        <div class="mb-3">
                            <label for="id_hora_inicio" class="form-label">Hora de inicio</label>
                            <input type="time" name="hora_inicio" id="id_hora_inicio" class="form-control" value="{{ form.hora_inicio.value|default_if_none:'' }}">
                        </div>
                        <div class="mb-3">
                            <label for="id_hora_fin" class="form-label">Hora de fin</label>
                            <input type="time" name="hora_fin" id="id_hora_fin" class="form-control" value="{{ form.hora_fin.value|default_if_none:'' }}">
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'horario_list' %}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
